<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="dashboard">
      <header class="header">
        <div class="header-left">
          <span class="logo">PiTV</span>
        </div>
        <div class="header-right">
          <div class="sys-stats">
            <span class="sys-item">🌡 <span id="sys-temp">—</span></span>
            <span class="sys-item">⚙ <span id="sys-cpu">—</span></span>
            <span class="sys-item">💾 <span id="sys-ram">—</span></span>
          </div>
          <span class="clock" id="clock"></span>
          <button class="settings-btn" id="settings-btn" aria-label="Settings">&#9881;</button>
        </div>
      </header>
      <main class="grid-wrapper">
        <div class="info-row">
          <section class="section">
            <h2 class="section-title"><span data-i18n="sectionWeather"></span> · <span id="weather-location"></span></h2>
            <div id="weather"></div>
          </section>
          <section class="section">
            <h2 class="section-title" data-i18n="sectionCalendar"></h2>
            <div id="calendar"></div>
          </section>
        </div>
        <section class="section section-home">
          <h2 class="section-title" data-i18n="sectionHome"></h2>
          <div class="home-controls" id="home-controls"></div>
        </section>
        <section class="section">
          <h2 class="section-title" data-i18n="sectionStreaming"></h2>
          <div class="grid" id="service-grid"></div>
        </section>
      </main>
    </div>
    <div class="settings-overlay" id="settings-overlay" hidden>
      <div class="settings-modal" role="dialog" aria-modal="true" aria-label="Settings">
        <h2 class="settings-title" data-i18n="settingsTitle"></h2>

        <div class="settings-section-label" data-i18n="settingsLanguage"></div>
        <div class="settings-lang-row">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="es">ES</button>
        </div>

        <div class="settings-section-label" data-i18n="settingsDashboardTitle"></div>
        <div class="settings-cal-row">
          <input
            type="text"
            id="title-input"
            class="settings-input"
            placeholder="KuKu's Home"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="settings-save-btn" data-i18n="settingsSave" id="title-save"></button>
        </div>

        <div class="settings-section-label" data-i18n="settingsLocation"></div>
        <div class="settings-search">
          <input
            type="text"
            id="settings-input"
            class="settings-input"
            data-i18n-ph="cityPlaceholder"
            placeholder="Enter city name…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <ul class="settings-results" id="settings-results" role="listbox"></ul>

        <div class="settings-section-label" data-i18n="settingsCalendarUrl"></div>
        <div class="settings-cal-row">
          <input
            type="url"
            id="cal-url-input"
            class="settings-input"
            placeholder="https://calendar.google.com/calendar/ical/…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="settings-save-btn" data-i18n="settingsSave" id="cal-url-save"></button>
        </div>

        <button class="settings-close" data-i18n="settingsClose" id="settings-close"></button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
