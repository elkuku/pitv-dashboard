<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiTV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="dashboard">
      <header class="header">
        <div class="header-left">
          <span class="logo">PiTV</span>
        </div>
        <div class="header-right">
          <span class="clock" id="clock"></span>
          <button class="settings-btn" id="settings-btn" aria-label="Settings">&#9881;</button>
        </div>
      </header>
      <main class="grid-wrapper">
        <section class="section">
          <h2 class="section-title">Streaming</h2>
          <div class="grid" id="service-grid"></div>
        </section>
        <section class="section">
          <h2 class="section-title">Weather · <span id="weather-location"></span></h2>
          <div id="weather"></div>
        </section>
      </main>
    </div>
    <div class="settings-overlay" id="settings-overlay" hidden>
      <div class="settings-modal" role="dialog" aria-modal="true" aria-label="Location settings">
        <h2 class="settings-title">Set Location</h2>
        <div class="settings-search">
          <input
            type="text"
            id="settings-input"
            class="settings-input"
            placeholder="Enter city name…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <ul class="settings-results" id="settings-results" role="listbox"></ul>
        <button class="settings-close" id="settings-close">Cancel</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
